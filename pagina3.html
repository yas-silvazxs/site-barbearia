<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia Elite - Agendamento</title>
    <link rel="stylesheet" href="style3.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <h1>✂️ Barbearia Elite</h1>
            </div>
            <div class="progress">
                <span class="step active">1</span>
                <span class="step active">2</span>
                <span class="step active">3</span>
                <span class="step">4</span>
            </div>
        </header>

        <main class="agendamento-container">
            <h2>3. Escolha seu Horário</h2>
            
            <div class="calendario">
                <h3>Selecione o Dia:</h3>
                <div class="dias-disponiveis" id="diasContainer">
                    <!-- Dias serão gerados pelo JS -->
                </div>
            </div>

            <div class="horarios" id="horariosContainer" style="display: none;">
                <h3>Horários Disponíveis:</h3>
                <div class="horarios-lista" id="horariosLista">
                    <!-- Horários serão gerados pelo JS -->
                </div>
            </div>

            <button id="btnConfirmar" class="btn-next" style="display: none;" onclick="confirmarAgendamento()">
                Confirmar Agendamento → Contato
            </button>
        </main>
    </div>

    <script src="script3.js"></script>
</body>
</html>
