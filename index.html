<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia - Cadastro</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <header>
        <h1>Bem-vindo à Barbearia</h1>
        <p>Faça seu cadastro para continuar</p>
    </header>
    <main>
        <form id="cadastroForm">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" required>

            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" required>

            <label for="servico">Serviço Procurado:</label>
            <select id="servico" required>
                <option value="">Selecione</option>
                <option value="Barba">Barba</option>
                <option value="Sombrancelha">Sombrancelha</option>
                <option value="Cortes">Cortes</option>
                <option value="Pigmentação">Pigmentação</option>
                <option value="Luzes">Luzes</option>
                <option value="Platinados">Platinados</option>
                <option value="Outros">Outros</option>
            </select>

            <button type="submit">Próximo</button>
        </form>
    </main>
    <script src="script1.js"></script>
</body>
</html>
