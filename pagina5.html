<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia - Agendamento Confirmado</title>
    <link rel="stylesheet" href="style5.css">
</head>
<body>
    <header>
        <h1>Agendamento Confirmado!</h1>
    </header>
    <main>
        <div class="confirmacao">
            <p>Obrigado por agendar conosco!</p>
            <p>Seus dados:</p>
            <ul>
                <li><strong>Nome:</strong> <span id="nome"></span></li>
                <li><strong>Telefone:</strong> <span id="telefone"></span></li>
                <li><strong>Serviço:</strong> <span id="servico"></span></li>
                <li><strong>Dia:</strong> <span id="dia"></span></li>
                <li><strong>Horário:</strong> <span id="hora"></span></li>
            </ul>
            <p>Clique no botão abaixo para enviar a confirmação para a barbearia via WhatsApp.</p>
            <button id="enviarWhatsBtn">Enviar via WhatsApp</button>
        </div>
    </main>
    <script src="script5.js"></script>
</body>
</html>
