<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barbearia - Agendamento</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Agendamento</h1>
    <p>Escolha o dia e horário disponíveis.</p>
  </header>

  <main>
    <section class="card">
      <h2>Horários disponíveis</h2>
      <form id="formAgendamento">
        <label for="dia">Dia</label>
        <select id="dia" name="dia" required>
          <option value="">Selecione o dia</option>
          <option value="Segunda-feira">Segunda-feira</option>
          <option value="Terça-feira">Terça-feira</option>
          <option value="Quarta-feira">Quarta-feira</option>
          <option value="Quinta-feira">Quinta-feira</option>
          <option value="Sexta-feira">Sexta-feira</option>
          <option value="Sábado">Sábado</option>
        </select>

        <label for="horario">Horário</label>
        <select id="horario" name="horario" required>
          <option value="">Selecione o horário</option>
          <option value="09:00">09:00</option>
          <option value="10:00">10:00</option>
          <option value="11:00">11:00</option>
          <option value="13:00">13:00</option>
          <option value="14:00">14:00</option>
          <option value="15:00">15:00</option>
          <option value="16:00">16:00</option>
          <option value="17:00">17:00</option>
        </select>

        <label for="servicoAgendamento">Serviço</label>
        <select id="servicoAgendamento" name="servicoAgendamento" required>
          <option value="">Selecione o serviço</option>
          <option value="Barba">Barba</option>
          <option value="Sobrancelha">Sobrancelha</option>
          <option value="Cortes">Cortes</option>
          <option value="Pigmentação">Pigmentação</option>
          <option value="Luzes">Luzes</option>
          <option value="Platinados">Platinados</option>
          <option value="Outros">Outros</option>
        </select>

        <button type="submit">Agendar</button>
      </form>
    </section>

    <nav class="menu">
      <a href="index.html">Cadastro</a>
      <a href="prices.html">Preços</a>
      <a href="location.html">Localização</a>
    </nav>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
